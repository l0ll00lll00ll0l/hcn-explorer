<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Highly Composite Numbers</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .section h2 { margin-top: 0; }
        .matrix-table { border-collapse: collapse; }
        .matrix-table td, .matrix-table th { padding: 5px 10px; border: 1px solid #ddd; }
        .hcn-list { max-height: 300px; overflow-y: auto; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; }
        .power-proved { background-color: #90EE90; padding: 2px 4px; }
        .power-not-proved { background-color: #FFA500; padding: 2px 4px; }
        .toggle-arrow { cursor: pointer; user-select: none; display: inline-block; width: 20px; }
        .prime-index-hcns { display: none; margin-top: 5px; padding-left: 25px; }
        .collapsible-content { display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
    <h1>Highly Composite Numbers Explorer</h1>
    
    <div th:if="${matrix.lastExecutionTimeMs > 0}" style="padding: 10px; background-color: #e8f5e9; margin-bottom: 10px;">
        <strong>Last execution:</strong> Found <span th:text="${matrix.provedHcnList.size()}"></span> HCNs in <span th:text="${matrix.lastExecutionTimeMs}"></span> ms
    </div>
    
    <div th:if="${enableGraph and matrix.progressData.size() > 0}" style="margin-bottom: 20px;">
        <canvas id="progressChart" width="1600" height="600"></canvas>
        <script th:inline="javascript">
            const progressData = [[${matrix.progressData}]];
            const chartData = progressData.map(d => ({x: d[0], y: d[1]}));
            const extensionEvents = [[${matrix.extensionEvents}]];
            
            const ctx = document.getElementById('progressChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'HCNs Found',
                        data: chartData,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: false,
                    scales: {
                        x: { 
                            type: 'linear',
                            title: { display: true, text: 'Time (ms)' }
                        },
                        y: { 
                            title: { display: true, text: 'HCN Count' }
                        }
                    },
                    plugins: {
                        annotation: {
                            annotations: extensionEvents.map(e => ({
                                type: 'line',
                                xMin: e.time,
                                xMax: e.time,
                                borderColor: e.type === 'nextPrime' ? 'rgba(255, 0, 0, 0.5)' : 'rgba(0, 0, 255, 0.5)',
                                borderWidth: 2,
                                label: {
                                    display: true,
                                    content: e.label,
                                    position: 'start'
                                }
                            }))
                        },
                        zoom: {
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true },
                                mode: 'xy'
                            },
                            pan: {
                                enabled: true,
                                mode: 'xy'
                            }
                        }
                    }
                }
            });
        </script>
        <div th:if="${!matrix.extensionEvents.isEmpty()}" style="margin-top: 10px; font-size: 12px;">
            <strong>Extension Events:</strong>
            <span th:each="event, iterStat : ${matrix.extensionEvents}">
                <span th:style="'color: ' + (${event.type} == 'nextPrime' ? 'red' : 'blue')" th:text="${event.label} + ' (' + ${event.time} + 'ms)'">
                </span><span th:if="!${iterStat.last}">, </span>
            </span>
        </div>
    </div>
    
    <div class="section">
        <h2>Configuration</h2>
        <form method="post" action="/setDisplayFormat" style="margin-bottom: 10px;">
            <label>
                <input type="radio" name="format" value="full" th:checked="${displayFormat == 'full'}" onchange="this.form.submit()"> Full (p0^9 × p1^5)
            </label>
            <label style="margin-left: 20px;">
                <input type="radio" name="format" value="short" th:checked="${displayFormat == 'short'}" onchange="this.form.submit()"> Short (9|5)
            </label>
        </form>
        <form method="post" action="/setDisplayOptions">
            <label>
                <input type="checkbox" name="showValue" th:checked="${showValue}" onchange="this.form.submit()"> HCN Value
            </label>
            <label style="margin-left: 20px;">
                <input type="checkbox" name="showFactor" th:checked="${showFactor}" onchange="this.form.submit()"> HCN Divisor Count
            </label>
            <br>
            <label style="margin-top: 10px; display: inline-block;">
                <input type="checkbox" name="enableGraph" th:checked="${enableGraph}" onchange="this.form.submit()"> Enable Progress Graph
            </label>
            <label style="margin-left: 20px;">
                Sample every <input type="number" name="sampleInterval" th:value="${sampleInterval}" min="1" style="width: 60px;" onchange="this.form.submit()"> HCNs
            </label>
            <br>
            <label style="margin-top: 10px; display: inline-block;">
                <input type="checkbox" name="trackNextPrime" th:checked="${trackNextPrime}" onchange="this.form.submit()"> Track Next Prime
            </label>
            <label style="margin-left: 20px;">
                <input type="checkbox" name="trackPowerExtension" th:checked="${trackPowerExtension}" onchange="this.form.submit()"> Track Power Extension
            </label>
        </form>
    </div>
    
    <div>
        <form method="post" action="/proveHcns" style="display: inline;">
            <label>Determine next <input type="number" name="count" value="1000" min="1" style="width: 80px;"> HCNs</label>
            <button type="submit">Start Detection</button>
        </form>
        <form method="post" action="/reset" style="display: inline;">
            <button type="submit">Reset</button>
        </form>
    </div>
    
    <div class="section">
        <h2>
            <span class="toggle-arrow" onclick="toggleSection('matrix-content')">▶</span>
            Matrix
        </h2>
        <div id="matrix-content" class="collapsible-content">
        <table class="matrix-table">
            <tr>
                <th>Prime Index</th>
                <th>Powers (Active Count)</th>
            </tr>
            <tr th:each="primeIndex : ${matrix.primeIndexes}">
                <td th:text="'p' + ${primeIndex.index}"></td>
                <td>
                    <span th:each="power, iterStat : ${primeIndex.powers}">
                        <span th:class="${power.proved} ? 'power-proved' : 'power-not-proved'" 
                              th:text="${power.power} + ' (' + ${power.activeCount} + ')'"></span>
                        <span th:if="!${iterStat.last}">, </span>
                    </span>
                </td>
            </tr>
        </table>
        
        <h3 style="margin-top: 20px;">PrimeIndex HCN Lists</h3>
        <div th:each="primeIndex : ${matrix.primeIndexes}" style="margin: 5px 0;">
            <span class="toggle-arrow" th:onclick="'toggleList(' + ${primeIndex.index} + ')'">▶</span>
            <span th:text="'p' + ${primeIndex.index} + ': ' + ${primeIndex.hcnList.size()} + ' HCNs'"></span>
            <div th:id="'hcn-list-' + ${primeIndex.index}" class="prime-index-hcns">
                <div th:if="${primeIndex.hcnList.isEmpty()}">Empty</div>
                <div th:each="hcn : ${primeIndex.hcnList}">
                    <span th:text="${displayFormat == 'short' ? hcn.toShortString(showValue, showFactor) : hcn.toString(showValue, showFactor)}"></span>
                </div>
            </div>
        </div>
        </div>
    </div>
    
    <script>
        function toggleSection(id) {
            const content = document.getElementById(id);
            const arrow = event.target;
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.textContent = '▶';
            } else {
                content.style.display = 'block';
                arrow.textContent = '▼';
            }
        }
        
        function toggleList(index) {
            const list = document.getElementById('hcn-list-' + index);
            const arrow = event.target;
            if (list.style.display === 'block') {
                list.style.display = 'none';
                arrow.textContent = '▶';
            } else {
                list.style.display = 'block';
                arrow.textContent = '▼';
            }
        }
    </script>
    
    <div class="section">
        <h2>
            <span class="toggle-arrow" onclick="toggleSection('candidates-content')">▶</span>
            HCN List (Candidates) - <span th:text="${matrix.hcnList.size()}"></span> items
        </h2>
        <div id="candidates-content" class="collapsible-content">
        <div class="hcn-list">
            <div th:if="${matrix.hcnList.isEmpty()}">No candidates yet</div>
            <div th:each="hcn : ${matrix.hcnList}">
                <span th:text="${displayFormat == 'short' ? hcn.toShortString(showValue, showFactor) : hcn.toString(showValue, showFactor)}"></span>
            </div>
        </div>
        </div>
    </div>
    
    <div class="section">
        <h2>
            <span class="toggle-arrow" onclick="toggleSection('proved-content')">▶</span>
            Proved List - <span th:text="${matrix.provedHcnList.size()}"></span> items
        </h2>
        <div id="proved-content" class="collapsible-content">
        <div class="hcn-list">
            <div th:if="${matrix.provedHcnList.isEmpty()}">No proved HCNs yet</div>
            <div th:each="hcn : ${matrix.provedHcnList}">
                <span th:text="${displayFormat == 'short' ? hcn.toShortString(showValue, showFactor) : hcn.toString(showValue, showFactor)}"></span>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
